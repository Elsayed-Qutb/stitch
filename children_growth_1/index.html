<style>
        body {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(96, 99, 238, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 39, 207, 0.05) 0px, transparent 50%);

<body class="font-arabic-body text-on-background flex items-center justify-center p-md">
<!-- Auth Shell Suppression: Per the "Semantic Shell Mandate", navigation is excluded for transactional/login screens. -->
<main class="w-full max-w-[480px]">
<!-- Brand Identity Section -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-primary to-tertiary mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="clinical_notes" style="">clinical_notes</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-xs" style="">children Growth</h1>
<p class="font-arabic-body text-on-surface-variant" style="">منصة متطورة لمتابعة التطور الصحي للأطفال</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-lg shadow-[0_20px_40px_-15px_rgba(70,72,212,0.08)] relative overflow-hidden">
<!-- Subtle Decorative Gradient -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="relative z-10">
<div class="mb-lg">
<h2 class="font-headline-md text-title-sm text-on-surface mb-xs" style="">تسجيل الدخول</h2>
<p class="text-label-sm text-on-surface-variant" style="">يرجى إدخال بيانات الاعتماد الخاصة بك للوصول إلى لوحة التحكم</p>
</div>
<form class="space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="block text-label-sm text-on-surface-variant font-medium pr-xs" style="">البريد الإلكتروني</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline" data-icon="mail" style="">mail</span>
<input class="w-full h-12 bg-surface-container-low border-transparent rounded-lg pr-12 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-body-md" placeholder="example@growth.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="block text-label-sm text-on-surface-variant font-medium" style="">كلمة المرور</label>
<a class="text-label-sm text-primary hover:underline transition-all" href="#" style="">نسيت كلمة المرور؟</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline" data-icon="lock" style="">lock</span>
<input class="w-full h-12 bg-surface-container-low border-transparent rounded-lg pr-12 focus:bg-white focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all text-body-md" placeholder="••••••••" type="password">
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-base px-xs">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox">
<label class="text-label-sm text-on-surface-variant select-none" for="remember" style="">تذكرني على هذا الجهاز</label>
</div>
<!-- Action Button -->
<button onclick="goToDashboard()" class="w-full h-14 bg-gradient-to-l from-primary to-tertiary text-on-primary rounded-lg font-bold text-body-md shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-base" type="button">
<span class="" style="">تسجيل الدخول</span>
<span class="material-symbols-outlined text-xl" data-icon="login" style="">login</span>
</button>
</form>
<!-- Alternative Action -->
<div class="mt-lg pt-md border-t border-outline-variant/30 text-center">
<p class="text-label-sm text-on-surface-variant" style="">
                        ليس لديك حساب؟ 
                        <a class="text-primary font-bold hover:underline" href="#" style="">إنشاء حساب جديد</a>
</p>
</div>
</div>
</div>

<div class="glass-card p-base rounded-lg flex items-center gap-base">

<div class="w-8 h-8 rounded-full bg-tertiary-container/20 flex items-center justify-center text-tertiary">

</div>
<div>
<p class="text-[10px] font-bold text-on-surface leading-tight" style="">دعم فني</p>
<p class="text-[9px] text-on-surface-variant leading-tight" style="">متاح على مدار الساعة</p>

<div class="absolute bottom-[10%] right-[5%] w-[300px] h-[300px] bg-tertiary/5 rounded-full blur-[80px]"></div>
</div>
